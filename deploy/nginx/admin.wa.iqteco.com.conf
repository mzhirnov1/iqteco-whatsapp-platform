# /etc/nginx/sites-enabled/admin.wa.iqteco.com.conf

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.wa.iqteco.com;

    ssl_certificate     /etc/letsencrypt/live/wa.iqteco.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.iqteco.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    add_header          Strict-Transport-Security "max-age=31536000" always;
    add_header          X-Frame-Options "DENY" always;
    add_header          X-Content-Type-Options "nosniff" always;

    root /var/www/admin.wa.iqteco.com/public;
    index index.php;

    client_max_body_size 50m;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.1-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_read_timeout 60;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name admin.wa.iqteco.com;
    return 301 https://$host$request_uri;
}
