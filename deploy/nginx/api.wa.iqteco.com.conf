# /etc/nginx/sites-enabled/api.wa.iqteco.com.conf
# Reverse-proxy для Green API совместимых вызовов.
# Путь: /waInstance{idInstance}/{method}/{token}
# Backend выбирается из /etc/nginx/wa-instances.map (генерируется админкой).

map $wa_instance_id $wa_backend {
    default                   "";
    include                   /etc/nginx/wa-instances.map;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.wa.iqteco.com;

    ssl_certificate     /etc/letsencrypt/live/wa.iqteco.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa.iqteco.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    add_header          Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 100m;
    proxy_read_timeout   120s;

    location ~ ^/waInstance(?<wa_instance_id>\d+)/ {
        if ($wa_backend = "") {
            return 404 '{"error":"unknown_instance"}';
        }
        proxy_pass http://$wa_backend$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404 '{"error":"not_found"}';
        default_type application/json;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name api.wa.iqteco.com;
    return 301 https://$host$request_uri;
}
